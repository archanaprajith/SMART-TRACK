<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTrack</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary: #4ade80;
            --danger: #ef4444;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            width: 320px;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px 24px;
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            color: white;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header p {
            margin: 4px 0 0;
            font-size: 12px;
            opacity: 0.9;
        }

        .container {
            padding: 24px;
        }

        .status-card {
            background: var(--surface-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .status-text {
            display: flex;
            flex-direction: column;
        }

        .status-title {
            font-size: 16px;
            font-weight: 600;
        }

        .status-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #4b5563;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--surface-color);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 1px solid #2a2a2a;
        }

        .stat-num {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: auto;
            border-top: 1px solid #222;
            padding: 12px 24px;
            cursor: pointer;
        }
        
        .footer:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>SmartTrack</h1>
        <p>Procrastination Trap</p>
    </div>

    <div class="container">
        
        <div class="status-card">
            <div class="status-text">
                <span class="status-title">Study Hub Mode</span>
                <span class="status-sub" id="status-label">Loading...</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="power-toggle" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-num" id="stat-distractions">0</div>
                <div class="stat-label">Distractions Blocked</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="stat-sessions">0</div>
                <div class="stat-label">Study Sessions</div>
            </div>
        </div>

    </div>
    
    <div class="footer" id="reload-btn">
        Refresh Active Tab
    </div>

    <script src="popup.js"></script>
</body>
</html>
