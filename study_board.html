<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTrack - Study Hub</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-primary: #f1f1f1;
            --text-secondary: #aaaaaa;
            --card-hover: #222222;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Roboto', Arial, sans-serif;
        }

        .header {
            padding: 24px 32px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .search-container {
            display: flex;
            gap: 12px;
        }

        .search-container input {
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid #444;
            background: #121212;
            color: white;
            width: 300px;
            font-size: 16px;
        }

        #smarttrack-custom-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 16px; 
            row-gap: 40px; 
            padding: 32px; 
            width: calc(100% - 64px);
            margin: 0 auto;
        }

        .smarttrack-card {
            display: flex; 
            flex-direction: column; 
            text-decoration: none;
            color: inherit; 
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .smarttrack-card:hover {
            transform: translateY(-4px);
        }

        .thumbnail-container {
            position: relative; 
            width: 100%; 
            aspect-ratio: 16/9; 
            margin-bottom: 12px; 
            overflow: hidden; 
            border-radius: 12px;
            background: #222;
        }

        .thumbnail-container img {
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        .duration-badge {
            position: absolute; 
            bottom: 6px; 
            right: 6px; 
            background: rgba(0,0,0,0.8); 
            color: white; 
            padding: 3px 6px; 
            font-size: 12px; 
            font-weight: 500; 
            border-radius: 4px;
        }

        .details-container {
            display: flex; 
            gap: 12px; 
            padding-right: 24px;
        }

        .channel-icon {
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            background: #333;
            flex-shrink: 0;
        }

        .meta-container {
            display: flex; 
            flex-direction: column;
        }

        .video-title {
            font-size: 16px; 
            font-weight: 500; 
            line-height: 22px; 
            margin-bottom: 4px; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            color: var(--text-primary);
        }

        .video-channel {
            font-size: 14px; 
            color: var(--text-secondary);
        }

        .video-stats {
            font-size: 14px; 
            color: var(--text-secondary); 
            margin-top: 2px;
        }

        .loading {
            padding: 80px; 
            text-align: center; 
            color: #888; 
            font-size: 20px; 
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📚 SmartTrack Study Hub</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search for tutorials, courses..." value="programming tutorial course">
            <button onclick="loadVideos()" style="padding: 10px 20px; border-radius: 20px; border: none; background: #2e7d32; color: white; cursor: pointer; font-weight: bold;">Search</button>
        </div>
    </div>

    <!-- The grid container where videos will be injected -->
    <div id="smarttrack-custom-grid"></div>

    <script>
        async function loadVideos() {
            const grid = document.getElementById("smarttrack-custom-grid");
            const query = document.getElementById("searchInput").value;
            const encodedQuery = encodeURIComponent(query);
            
            grid.innerHTML = '<div class="loading">Fetching high-quality study materials... ⏳</div>';
            
            try {
                // IMPORTANT NOTE: When running this HTML file as a standalone local file (file://), 
                // modern browsers will block the fetch request due to CORS (Cross-Origin Resource Sharing).
                // This logic works flawlessly in content.js because Chrome Extensions bypass CORS 
                // when running directly on the allowed host (youtube.com).
                
                const response = await fetch(`https://www.youtube.com/results?search_query=${encodedQuery}`);
                const html = await response.text();
                
                const match = html.match(/var ytInitialData = (.*?);<\/script>/);
                if (!match) throw new Error("Could not find ytInitialData JSON structure");
                
                const data = JSON.parse(match[1]);
                let videos = [];
                
                const sections = data.contents.twoColumnSearchResultsRenderer.primaryContents.sectionListRenderer.contents;
                for (let section of sections) {
                    if (section.itemSectionRenderer && section.itemSectionRenderer.contents) {
                        for (let item of section.itemSectionRenderer.contents) {
                            if (item.videoRenderer) {
                                videos.push(item.videoRenderer);
                            }
                        }
                    }
                }
                
                renderCustomGrid(videos);
            } catch (error) {
                console.error("Failed to load background study videos", error);
                grid.innerHTML = `
                    <div class="loading" style="color: #ff6b6b; max-width: 600px; margin: 0 auto;">
                        <h3>⚠️ CORS Error</h3>
                        <p>Browsers block local HTML files from secretly downloading YouTube pages.</p>
                        <p>This code only works when running <b>inside the extension's content script</b> directly on YouTube.com, or if you launch Chrome with CORS disabled.</p>
                    </div>
                `;
            }
        }

        function renderCustomGrid(videos) {
            const grid = document.getElementById("smarttrack-custom-grid");
            grid.innerHTML = "";
            
            if (videos.length === 0) {
                grid.innerHTML = '<div class="loading">No videos found.</div>';
                return;
            }

            videos.forEach(v => {
                const videoId = v.videoId;
                const title = v.title.runs[0].text;
                const thumbnail = v.thumbnail.thumbnails.length > 0 ? v.thumbnail.thumbnails[v.thumbnail.thumbnails.length - 1].url : "";
                const channel = v.ownerText ? v.ownerText.runs[0].text : "YouTube Channel";
                const views = v.viewCountText ? v.viewCountText.simpleText : "";
                const time = v.publishedTimeText ? v.publishedTimeText.simpleText : "";
                const duration = v.lengthText ? v.lengthText.simpleText : "";
                const channelIcon = (v.channelThumbnailSupportedRenderers && v.channelThumbnailSupportedRenderers.channelThumbnailWithLinkRenderer.thumbnail.thumbnails[0].url) || "";
                
                const card = document.createElement("a");
                card.href = `https://www.youtube.com/watch?v=${videoId}`;
                card.target = "_blank"; // Open in new tab from the standalone app
                card.className = "smarttrack-card";
                
                card.innerHTML = `
                    <div class="thumbnail-container">
                        <img src="${thumbnail}" />
                        <span class="duration-badge">${duration}</span>
                    </div>
                    <div class="details-container">
                        ${channelIcon ? `<img src="${channelIcon}" class="channel-icon" />` : `<div class="channel-icon"></div>`}
                        <div class="meta-container">
                            <span class="video-title">${title}</span>
                            <span class="video-channel">${channel}</span>
                            <span class="video-stats">${views} ${time ? '• ' + time : ''}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Auto-load on open
        loadVideos();
    </script>
</body>
</html>
